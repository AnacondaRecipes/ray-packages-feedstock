{% set name = "ray-packages" %}
{% set version = "2.54.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/{{ name.split('-')[0] }}-project/{{ name.split('-')[0] }}/archive/refs/tags/{{ name.split('-')[0] }}-{{ version }}.tar.gz
  sha256: 3417142d8d46af16ca556c687b21c11812264dd98201935cc0af34b37773b30b
  patches:
    - patches/0001-Redis-deps-now-build-but-do-not-link.patch
    - patches/0002-Disable-making-entry-scripts.patch
    # - patches/0003-Add-bazel-linkopts-libs.patch
    - patches/0004-Ignore-warnings-in-event.cc-and-logging.cc.patch
    - patches/0005-Remove-all-dependencies-from-setup.py.patch
    - patches/0015-Don-t-build-redis-with-jemalloc-on-linux-aarch64.patch  # [linux and aarch64]
    - patches/0016-fix-redis-build-on-macos.patch  # [osx]
    - patches/0017-Don-t-use-Xcode-on-macOS.patch  # [osx]
    - patches/0018-Remove-runtime-agent-dependencies.patch
    # See https://github.com/conda-forge/ray-packages-feedstock/issues/136
    # Keep in sync with current or active migration of libgrpc to avoid
    # ABI breakage
    - patches/0019-Vendor-grpc-1.67.1.patch
    - patches/0020-fix-missing-zlib-dependency-declarations.patch
    - patches/0021-win-fix-invalid-includes.patch # [win]

build:
  number: 0
  skip: true  # [py<310]

# The requirements/build&host sections of ray-core need to be replicated here.
# It is not clear why at this time but not having them here causes conda build to behave non-deterministically and crash. 
requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - python
    - patch          # [not win]
    - m2-patch       # [win]
    - bazel =6.5.0
    - curl
    - git
    - m2-unzip  # [win]
    - unzip  # [not win]
    - m2-make   # [win]
    - make      # [not win]
    - pkg-config  # [osx or (linux and aarch64)]
    - patchelf  # [linux]
    - psutil
  host:
    - python
    - pip
    - cython >=3.0.12
    - pkg-config  # [osx]
    - setuptools
    - wheel
    - openjdk =11

outputs:
  - name: ray-all
    build:
      # Until all of the ray-* packages are available in defaults, skipping the ray-all metapackage.
      skip: true
    requirements:
      host:
      run:
        - python
        - {{ pin_subpackage('ray-adag', exact=True) }}
        # autoscaler is completely disabled for now as it's missing a bunch of dependencies
        # and there's not much interest in adding them (yet).
        # autoscaler does not work on Windows, no point of building it; see below
        #- {{ pin_subpackage('ray-autoscaler', exact=True) }}  # [not win]
        - {{ pin_subpackage('ray-client', exact=True) }}
        - {{ pin_subpackage('ray-data', exact=True) }}
        - {{ pin_subpackage('ray-default', exact=True) }}
        - {{ pin_subpackage('ray-dashboard', exact=True) }}
        - {{ pin_subpackage('ray-debug', exact=True) }}
        - {{ pin_subpackage('ray-observability', exact=True) }}
        - {{ pin_subpackage('ray-rllib', exact=True) }}
        - {{ pin_subpackage('ray-serve', exact=True) }}
        - {{ pin_subpackage('ray-serve-grpc', exact=True) }}
        - {{ pin_subpackage('ray-tune', exact=True) }}
        - {{ pin_subpackage('ray-train', exact=True) }}
    test:
      imports:
        - ray

  - name: ray-core
    script: build-core.sh  # [not win]
    script: build-core.bat  # [win]
    build:
      skip: true  # [py<310]
    build:
      entry_points:
        - ray = ray.scripts.scripts:main
      # Skip overlinking check for _raylet.so: Bazel-built binary uses ELF dynamic
      # tag 1879047926 (processor-specific) that conda-build's LIEF does not recognize,
      # causing "ValueError: 1879047926 is not a valid TAG" in post_process.
      overlinking_ignore_patterns:  # [linux and aarch64]
        - "*_raylet.so"             # [linux and aarch64]
    requirements:
      build:
        - python
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - bazel =6.5.0
        - curl
        - git
        - m2-make   # [win]
        - make      # [not win]
        - m2-unzip  # [win]
        - unzip  # [not win]
        - pkg-config  # [osx or (linux and aarch64)]
        - patchelf  # [linux]
        - psutil
      host:
        - python
        - pip
        - cython >=0.29.32
        - pkg-config  # [osx]
        - setuptools
        - wheel
        - openjdk =11
      run:
        - python
        - click >=7.0
        - filelock
        - jsonschema
        - msgpack-python >=1.0.0,<2.0.0
        - packaging >=24.2
        - protobuf >=3.20.3
        - pyyaml
        - aiosignal
        - frozenlist
        - requests
        # Named "Third-party Install" Upstream
        - psutil
        - setproctitle ==1.2.2
        - colorama
        - aiohttp
    test:
      imports:
        - ray
        - ray._raylet
        - ray.actor
        - ray.runtime_context
        - ray._private.state
        - ray._private.worker
      commands:
        - ray --help
        - ray start --head --verbose
        - ray stop --verbose

  - name: ray-default
    build:
      skip: true  # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-core', exact=True) }}
        - aiohttp >=3.13.3
        - aiohttp-cors
        - colorful
        - py-spy >=0.2.0  # [py<312]
        - py-spy >=0.4.0  # [py>=312]
        - requests
        - grpcio >=1.42.0
        - opencensus
        - opentelemetry-sdk >=1.30.0
        - opentelemetry-exporter-prometheus
        - opentelemetry-proto
        - pydantic <3,!=2.0.*,!=2.1.*,!=2.2.*,!=2.3.*,!=2.4.*,!=2.5.*,!=2.6.*,!=2.7.*,!=2.8.*,!=2.9.*,!=2.10.*,!=2.11.*
        - prometheus_client >=0.7.1
        - smart_open
        - virtualenv >=20.0.24,!=20.21.1
    test:
      imports:
        - ray
        - ray._private.metrics_agent

  - name: ray-dashboard
    build:
      script:
        - cd python/ray/dashboard/client
        - npm install
        - npm ci
        - npm run build
        # not sure why this seems to get copied on windows but not linux...
        - mkdir -p $SP_DIR/ray/dashboard/client             # [not win]
        - cp -R ./build $SP_DIR/ray/dashboard/client/build  # [not win]
    requirements:
      host:
        - nodejs
        - python
      run:
        - python
        - {{ pin_subpackage('ray-default', exact=True) }}
        - typing-extensions
        - async-timeout
    test:
      imports:
        - ray.dashboard
      commands:
        - ray --help
        # Flaky on Linux64 CI, starting dashboard is failing sometimes.
        - ray start --head --include-dashboard=true --verbose  # [not linux64]
        - ray stop --verbose

  - name: ray-debug
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-core', exact=True) }}
        - py-spy >=0.2.0  # [py<312]
        - py-spy >=0.4.0  # [py>=312]
    test:
      imports:
        - ray

  - name: ray-client
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-core', exact=True) }}
        - grpcio !=1.56.0  # [osx]
        - grpcio  # [win or linux]
    test:
      imports:
        - ray

  - name: ray-rllib
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-tune', exact=True) }}
        - dm-tree
        - gymnasium ==1.2.2
        - lz4
        - ormsgpack>=1.7.0
        - pyyaml
        - scipy
    test:
      imports:
        - ray.rllib

  - name: ray-data
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-core', exact=True) }}
        - numpy >=1.20
        - pandas >=1.3
        - pyarrow >=9.0.0
        - fsspec
        - typing-extensions
    test:
      imports:
        - ray.data

  - name: ray-serve
    build:
      entry_points:
        - serve = ray.serve.scripts:cli
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-default', exact=True) }}
        - uvicorn-standard
        - requests
        - starlette
        - fastapi
        - watchfiles
    test:
      imports:
        - ray.serve

  - name: ray-serve-grpc
    build:
      entry_points:
        - serve = ray.serve.scripts:cli
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-serve', exact=True) }}
        - grpcio >=1.42.0
    test:
      imports:
        - ray.serve

  - name: ray-tune
    build:
      entry_points:
        - tune = ray.tune.scripts:cli
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-default', exact=True) }}
        - pandas
        - pydantic <3,!=2.0.*,!=2.1.*,!=2.2.*,!=2.3.*,!=2.4.*,!=2.5.*,!=2.6.*,!=2.7.*,!=2.8.*,!=2.9.*,!=2.10.*,!=2.11.*
        - tensorboardX >=1.9
        - requests
        - pyarrow >=9.0.0
        - fsspec
    test:
      imports:
        - ray.tune

  - name: ray-train
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-tune', exact=True) }}
    test:
      imports:
        - ray.train

  # the various ray[extra] installs, alphabetically
  - name: ray-adag
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-default', exact=True) }}
        # cupy is pinned instead of making cupy-cuda12x available
        # resolver will pick the best cuda variant
        - cupy  # [not osx]
    test:
      imports:
        - ray.dag

  - name: ray-air
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-data', exact=True) }}
        - {{ pin_subpackage('ray-serve', exact=True) }}
        - {{ pin_subpackage('ray-train', exact=True) }}
        - {{ pin_subpackage('ray-tune', exact=True) }}
    test:
      imports:
        - ray.air

  - name: ray-observability
    build:
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('ray-default', exact=True) }}
        - memray  # [not win]
    test:
      imports:
        - ray

about:
  home: https://www.ray.io
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
    - licenses/abseil-LICENSE.txt
    - licenses/antirez-redis-COPYING.txt
    - licenses/arrow-LICENSE.txt
    - licenses/boost-LICENSE_1_0.txt
    - licenses/boringssl-LICENSE.txt
    - licenses/deckarep-golang-set-LICENSE.txt
    - licenses/flatbuffers-LICENSE.txt
    - licenses/gabime-spdlog-LICENSE.txt
    - licenses/gflags-COPYING.txt
    - licenses/glog-COPYING.txt
    - licenses/go-logr-LICENSE.txt
    - licenses/googletest-LICENSE.txt
    - licenses/grpc-LICENSE.txt
    - licenses/msgpack-COPYING.txt
    - licenses/onsi-ginkgo-LICENSE.txt
    - licenses/onsi-gomega-LICENSE.txt
    - licenses/opencensus-LICENSE.txt
    - licenses/opencensus-proto-LICENSE.txt
    - licenses/prometheus-LICENSE.txt
    - licenses/redis-hiredis-COPYING.txt
    - licenses/tporadowski-redis-license.txt
    - licenses/zlib-LICENSE.txt
  summary: Ray is a fast and simple framework for building and running distributed applications.
  description: |
    Ray is a fast and simple framework for building and running
    distributed applications. It is split into ray-core, ray-default,
    ray-dashboard, ray-serve, ray-rllib, ray-client, ray-data, ray-tune,
    ray-train, ray-air, ray-observability and ray-all packages.
  doc_url: https://docs.ray.io
  dev_url: https://github.com/ray-project/ray

extra:
  recipe-maintainers:
    - dHannasch
    - h-vetinari
    - vnlitvinov
    - krfricke
